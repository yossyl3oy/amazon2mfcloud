name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build ZIP
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          zip -r "amazon2mfcloud-v${VERSION}.zip" \
            manifest.json popup/ content/ lib/ icons/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: amazon2mfcloud-*.zip
          generate_release_notes: true
